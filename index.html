<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouvidoria Sesc - Gestão de SLA</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --senac-blue: #003F7F; --senac-orange: #F47920;
            --bg: #F0F2F5; --white: #FFFFFF; --text: #1E293B;
            --muted: #64748B; --border: #E2E8F0; --danger: #EF4444;
            --success: #10B981; --warning: #F59E0B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; flex-direction: column; }

        /* Sidebar Responsiva */
        .sidebar { width: 260px; background: var(--senac-blue); color: #fff; height: 100vh; position: fixed; padding: 25px; display: flex; flex-direction: column; z-index: 100; box-shadow: 4px 0 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .sidebar h2 { font-size: 1.4rem; margin-bottom: 30px; color: var(--senac-orange); border-bottom: 2px solid rgba(244,121,32,0.3); padding-bottom: 15px; text-align: center; font-weight: 800; }
        .nav-item { padding: 14px; cursor: pointer; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .nav-item.active { background: var(--senac-orange); color: #fff; }

        /* Conteúdo Principal */
        .main { margin-left: 260px; flex: 1; padding: 30px; transition: 0.3s; width: calc(100% - 260px); }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 10px; }
        .topbar h1 { font-size: 1.5rem; font-weight: 800; color: var(--senac-blue); }
        
        /* Filtros */
        .filter-section { background: #fff; padding: 20px; border-radius: 16px; margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid var(--border); }
        .filter-group { flex: 1; min-width: 150px; display: flex; flex-direction: column; gap: 6px; }
        .filter-group label { font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; }
        .filter-group input, .filter-group select { padding: 12px; border: 1px solid var(--border); border-radius: 10px; outline: none; font-size: 0.9rem; width: 100%; }

        /* Cards Responsivos */
        .cards-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #fff; padding: 20px; border-radius: 20px; border-top: 6px solid var(--senac-blue); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .stat-card h4 { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
        .stat-val { font-size: 1.8rem; font-weight: 900; color: var(--senac-blue); }

        /* Tabela Responsiva */
        .table-container { background: #fff; border-radius: 20px; overflow-x: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 850px; }
        th { padding: 18px; text-align: left; background: #F8FAFC; color: var(--senac-blue); font-weight: 700; font-size: 0.75rem; text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 16px; border-bottom: 1px solid #F1F5F9; font-size: 0.85rem; }

        /* Badges */
        .badge { padding: 6px 12px; border-radius: 30px; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; white-space: nowrap; }
        .badge-open { background: #FEF3C7; color: #92400E; }
        .badge-done { background: #DCFCE7; color: #166534; }

        .btn-main { padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; color: #fff; }

        /* Media Queries para Mobile */
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; flex-direction: row; justify-content: space-between; padding: 15px; }
            .sidebar h2 { margin-bottom: 0; padding-bottom: 0; border: none; font-size: 1.1rem; }
            .nav-item, .sidebar button span { display: none; }
            .sidebar button { padding: 10px !important; margin: 0 !important; width: auto !important; }
            .main { margin-left: 0; width: 100%; padding: 15px; }
            .topbar { justify-content: center; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2>Sesc/Senac</h2>
    <div class="nav-item active"><i class="fas fa-th-large"></i> <span>Dashboard</span></div>
    <button class="btn-main" style="background:var(--senac-orange)" onclick="document.getElementById('fileInput').click()">
        <i class="fas fa-cloud-upload-alt"></i> <span>IMPORTAR</span>
    </button>
</aside>

<main class="main">
    <div class="topbar">
        <h1>Gestão de Protocolos e SLA</h1>
        <button class="btn-main" style="background:var(--success)" onclick="exportExcel()">
            <i class="fas fa-file-excel"></i> EXCEL
        </button>
    </div>

    <div class="filter-section">
        <div class="filter-group"><label>Início</label><input type="date" id="dateStart" onchange="processData()"></div>
        <div class="filter-group"><label>Fim</label><input type="date" id="dateEnd" onchange="processData()"></div>
        <div class="filter-group" style="flex-grow: 2;">
            <label>Busca Inteligente</label>
            <input type="text" id="fSearch" placeholder="Número, local ou tipo..." onkeyup="processData()">
        </div>
    </div>

    <div class="cards-container">
        <div class="stat-card"><h4>Total</h4><div class="stat-val" id="totalCount">0</div></div>
        <div class="stat-card" style="border-top-color: var(--warning);"><h4>Abertos</h4><div class="stat-val" id="openCount">0</div></div>
        <div class="stat-card" style="border-top-color: var(--danger);"><h4>Atrasos (>30d)</h4><div class="stat-val" id="lateCount">0</div></div>
        <div class="stat-card" style="border-top-color: var(--success);"><h4>Eficiência</h4><div class="stat-val" id="globalEff">100%</div></div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Protocolo</th>
                    <th>Realização</th>
                    <th>Status</th>
                    <th>Tipo</th>
                    <th>Localidade</th>
                    <th>Situação do Prazo</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</main>

<input type="file" id="fileInput" style="display:none" accept=".xlsx">

<script>
// CONFIGURAÇÃO FIREBASE (MANTIDA)
const firebaseConfig = {
  apiKey: "AIzaSyAaWmy-IVB8MX9hBH3wuw8zo83dHUzeqbM",
  authDomain: "relatorio-ouvidoria.firebaseapp.com",
  projectId: "relatorio-ouvidoria",
  storageBucket: "relatorio-ouvidoria.firebasestorage.app",
  messagingSenderId: "919992393287",
  appId: "1:919992393287:web:46e9d60ab2e07acfca1b62"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let allData = [];

function initApp() {
    db.collection("protocolos").onSnapshot((querySnapshot) => {
        allData = [];
        querySnapshot.forEach((doc) => {
            allData.push({ id: doc.id, ...doc.data() });
        });
        processData();
    });
}

window.onload = initApp;

// Tratamento de Data Robusto para evitar "Invalid Date"
function formatDateSafe(dateVal) {
    if (!dateVal) return null;
    let d;
    if (typeof dateVal === 'number') {
        d = new Date((dateVal - 25569) * 86400 * 1000);
    } else {
        const s = String(dateVal).trim();
        if (s.includes('/')) {
            const p = s.split(' ')[0].split('/');
            d = new Date(p[2], p[1] - 1, p[0]);
        } else {
            d = new Date(s);
        }
    }
    return isNaN(d.getTime()) ? null : d;
}

function processData() {
    const search = document.getElementById('fSearch').value.toLowerCase();
    const startF = document.getElementById('dateStart').value ? new Date(document.getElementById('dateStart').value + "T00:00:00") : null;
    const endF = document.getElementById('dateEnd').value ? new Date(document.getElementById('dateEnd').value + "T00:00:00") : null;

    let m = { total: 0, open: 0, late: 0 };

    const filtered = allData.filter(item => {
        const d = formatDateSafe(item['Data de Realização']);
        const statusRaw = String(item['Status'] || "").toLowerCase();
        const text = JSON.stringify(item).toLowerCase();

        const matchDate = (!startF || (d && d >= startF)) && (!endF || (d && d <= endF));
        const matchSearch = text.includes(search);

        if(matchDate && matchSearch) {
            m.total++;
            if(statusRaw.includes("andamento")) {
                m.open++;
                const diff = Math.floor((new Date() - d) / 86400000);
                if(diff > 30) m.late++;
            }
            return true;
        }
        return false;
    });

    document.getElementById('totalCount').innerText = m.total;
    document.getElementById('openCount').innerText = m.open;
    document.getElementById('lateCount').innerText = m.late;
    document.getElementById('globalEff').innerText = m.total > 0 ? ((m.total - m.late) / m.total * 100).toFixed(1) + "%" : "100%";

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = filtered.map(item => {
        const d = formatDateSafe(item['Data de Realização']);
        const status = String(item['Status'] || "");
        const isAberto = status.toLowerCase().includes("andamento");
        const diff = d ? Math.floor((new Date() - d) / 86400000) : 0;

        return `
            <tr>
                <td style="font-weight:800">${item['Número Sequencial'] || '-'}</td>
                <td>${d ? d.toLocaleDateString('pt-BR') : 'Data Inválida'}</td>
                <td><span class="badge ${isAberto ? 'badge-open' : 'badge-done'}">${status}</span></td>
                <td>${item['Tipo'] || '-'}</td>
                <td>${item['Localidade'] || '-'}</td>
                <td>
                    <span class="badge" style="${isAberto && diff > 30 ? 'background:#FEE2E2;color:#B91C1C' : ''}">
                        ${isAberto ? (diff > 30 ? '🚨 CRÍTICO ('+diff+'d)' : '⏳ NO PRAZO') : '✅ CONCLUÍDO'}
                    </span>
                </td>
                <td>
                    <button onclick="updateStatus('${item.id}', 'Finalizado')" style="color:var(--success);border:none;background:none;cursor:pointer;font-size:1.2rem">
                        <i class="fas fa-check-circle"></i>
                    </button>
                </td>
            </tr>
        `;
    }).join('');
}

async function updateStatus(id, newStatus) {
    await db.collection("protocolos").doc(id).update({ "Status": newStatus });
}

document.getElementById('fileInput').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = (evt) => {
        const wb = XLSX.read(new Uint8Array(evt.target.result), {type: 'array'});
        const rawData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval: ""});
        const batch = db.batch();
        rawData.forEach(item => batch.set(db.collection("protocolos").doc(), item));
        batch.commit().then(() => alert("Sincronizado com sucesso!"));
    };
    reader.readAsArrayBuffer(e.target.files[0]);
});

function exportExcel() {
    const ws = XLSX.utils.json_to_sheet(allData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Ouvidoria");
    XLSX.writeFile(wb, "Relatorio_Ouvidoria.xlsx");
}
</script>
</body>
</html>
