<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouvidoria Sesc/Senac - Gestão de SLA</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --current-brand: #003F7F; --senac-orange: #F47920; --sesc-blue: #003F7F;
            --bg: #F0F2F5; --white: #FFFFFF; --text: #1E293B;
            --muted: #64748B; --border: #E2E8F0; --danger: #EF4444;
            --success: #10B981; --warning: #F59E0B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            min-height: 100vh; 
            flex-direction: row; 
        }

        /* TELA DE LOGIN COM IMAGEM DE FUNDO (LINK DIRETO) */
        #loginScreen {
            position: fixed !important;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0, 63, 127, 0.4), rgba(0, 63, 127, 0.4)), 
                        url('https://lh3.googleusercontent.com/d/1ABw_8yhOXunSVya9stgdcqtf4N3GfXVG') no-repeat center center;
            background-size: cover;
        }

        .login-box {
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10000;
            pointer-events: auto !important;
        }

        .login-box input {
            width: 100%; padding: 14px; margin-bottom: 15px; 
            border: 1px solid var(--border); border-radius: 10px; outline: none;
        }

        /* SIDEBAR E LOGO CIRCULAR (LINK DIRETO) */
        .sidebar { 
            width: 260px; background: var(--current-brand); color: #fff; 
            height: 100vh; position: fixed; padding: 25px; 
            display: flex; flex-direction: column; z-index: 1000; 
            transition: 0.4s; align-items: center; 
        }
        
        .sidebar-logo {
            width: 90px; 
            height: 90px; 
            border-radius: 50%; 
            background: white; 
            display: block; 
            margin: 0 auto 15px; 
            object-fit: contain; 
            padding: 0px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }

        .sidebar h2 { font-size: 1.4rem; margin-bottom: 5px; color: #fff; text-align: center; font-weight: 800; width: 100%; }
        .sidebar p { font-size: 0.65rem; text-align: center; opacity: 0.7; margin-bottom: 25px; letter-spacing: 1px; width: 100%; }

        /* UNIDADES E NAVEGAÇÃO */
        .unidade-selector { display: flex; background: rgba(255,255,255,0.15); border-radius: 12px; padding: 4px; margin-bottom: 30px; width: 100%; }
        .unidade-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; cursor: pointer; color: #fff; background: transparent; font-weight: 800; font-size: 0.7rem; transition: 0.3s; }
        .unidade-btn.active { background: #fff; color: var(--current-brand); }
        .nav-item { padding: 14px; cursor: pointer; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; font-weight: 600; background: rgba(255,255,255,0.05); transition: 0.2s; width: 100%; }
        .nav-item.active { background: #fff; color: var(--current-brand); }

        /* CONTEÚDO PRINCIPAL */
        .main { margin-left: 260px; flex: 1; padding: 30px; width: calc(100% - 260px); transition: 0.4s; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .topbar h1 { font-size: 1.5rem; font-weight: 800; color: var(--current-brand); }
        .filter-section { background: #fff; padding: 20px; border-radius: 16px; margin-bottom: 25px; display: flex; gap: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid var(--border); align-items: flex-end; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 150px; }
        .filter-group label { font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; }
        .filter-group input { padding: 12px; border: 1px solid var(--border); border-radius: 10px; outline: none; font-size: 0.9rem; width: 100%; }
        .cards-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #fff; padding: 25px; border-radius: 20px; border-top: 6px solid var(--current-brand); box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        .stat-card h4 { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
        .stat-val { font-size: 2rem; font-weight: 900; color: var(--current-brand); }
        #dashboardView { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; display: none; }
        .chart-card { background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); min-height: 350px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .chart-card canvas { width: 100% !important; max-height: 300px; }
        .table-container { background: #fff; border-radius: 20px; overflow-x: auto; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { padding: 18px; text-align: left; background: #F8FAFC; color: var(--current-brand); font-size: 0.75rem; text-transform: uppercase; border-bottom: 2px solid var(--border); position: relative; }
        td { padding: 16px; border-bottom: 1px solid #F1F5F9; font-size: 0.85rem; }
        .filter-dropdown { display: none; position: absolute; background: white; border: 1px solid var(--border); padding: 15px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 1000; min-width: 200px; top: 45px; right: 0; text-transform: none; }
        .filter-dropdown.active { display: block; }
        .badge { padding: 6px 12px; border-radius: 30px; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; white-space: nowrap; }
        .badge-open { background: #FEF3C7; color: #92400E; }
        .badge-done { background: #DCFCE7; color: #166534; }
        .btn-main { padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; color: #fff; transition: 0.2s; display: flex; align-items: center; gap: 8px; justify-content: center; width: 100%; }
        .btn-import { background: var(--senac-orange); }
        .btn-danger { background: var(--danger); }
        .btn-logout { background: transparent; border: 1px solid rgba(255,255,255,0.3); font-size: 0.7rem; margin-top: 10px; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 15px; }
            .sidebar-logo { display: none; }
            .main { margin-left: 0; width: 100%; padding: 15px; }
            #dashboardView { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <h2 style="color:var(--current-brand); margin-bottom:10px;">Acesso Restrito</h2>
        <p style="font-size:0.8rem; color:var(--muted); margin-bottom:25px;">Entre com suas credenciais de acesso</p>
        <input type="email" id="loginEmail" placeholder="E-mail profissional">
        <input type="password" id="loginPass" placeholder="Senha">
        <button onclick="handleLogin()" class="btn-main" style="background:var(--current-brand);">ENTRAR NO SISTEMA</button>
        <p id="loginError" style="color:var(--danger); font-size:0.75rem; margin-top:15px; display:none; font-weight:bold;">E-mail ou senha incorretos.</p>
    </div>
</div>

<aside class="sidebar">
    <img src="https://lh3.googleusercontent.com/d/17mdvylkyJFyYwvbYjllKYj3l6mJzwSWm" alt="Ouvidoria Logo" class="sidebar-logo">
    <h2 id="brandTitle">Sesc</h2>
    <p>Gestão de Ouvidoria</p>

    <div class="unidade-selector">
        <button class="unidade-btn active" id="btnSesc" onclick="switchUnidade('sesc')">SESC</button>
        <button class="unidade-btn" id="btnSenac" onclick="switchUnidade('senac')">SENAC</button>
    </div>

    <div class="nav-item active" onclick="toggleView('tabela', this)"><i class="fas fa-table"></i> <span>Tabela</span></div>
    <div class="nav-item" onclick="toggleView('dashboard', this)"><i class="fas fa-chart-pie"></i> <span>Dashboard</span></div>
    
    <div style="margin-top: auto; display: flex; flex-direction: column; gap: 8px; width: 100%;">
        <button class="btn-main btn-danger" onclick="clearDatabase()"><i class="fas fa-trash-alt"></i> LIMPAR</button>
        <button class="btn-main btn-import" onclick="document.getElementById('fileInput').click()"><i class="fas fa-upload"></i> IMPORTAR</button>
        <button class="btn-main btn-logout" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> SAIR</button>
    </div>
</aside>

<main class="main">
    <div class="topbar">
        <h1 id="mainTitle">Gestão de Protocolos Sesc</h1>
        <button class="btn-main" style="background:var(--success); width: auto;" onclick="exportExcel()"><i class="fas fa-file-excel"></i> EXCEL</button>
    </div>

    <div class="filter-section">
        <div class="filter-group"><label>Início</label><input type="date" id="dateStart" onchange="processData()"></div>
        <div class="filter-group"><label>Fim</label><input type="date" id="dateEnd" onchange="processData()"></div>
        <div class="filter-group" style="flex-grow: 2;"><label>Busca</label><input type="text" id="fSearch" onkeyup="processData()" placeholder="Número, local ou tipo..."></div>
    </div>

    <div class="cards-container">
        <div class="stat-card"><h4>Total</h4><div class="stat-val" id="totalCount">0</div></div>
        <div class="stat-card"><h4>Em Aberto</h4><div class="stat-val" id="openCount">0</div></div>
        <div class="stat-card"><h4>Atrasos</h4><div class="stat-val" id="lateCount">0</div></div>
        <div class="stat-card"><h4>Eficiência</h4><div class="stat-val" id="globalEff">100%</div></div>
    </div>

    <div id="dashboardView">
        <div class="chart-card"><canvas id="chartStatus"></canvas></div>
        <div class="chart-card"><canvas id="chartPrazo"></canvas></div>
    </div>

    <div id="tableView" class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Protocolo</th>
                    <th>Realização</th>
                    <th>Status <i class="fas fa-filter" style="cursor:pointer" onclick="toggleDrop(event, 'dropSt')"></i>
                        <div id="dropSt" class="filter-dropdown"><div id="listSt"></div></div>
                    </th>
                    <th>Ação</th>
                    <th>Tipo</th>
                    <th>Localidade</th>
                    <th>Prazo <i class="fas fa-filter" style="cursor:pointer" onclick="toggleDrop(event, 'dropPrz')"></i>
                        <div id="dropPrz" class="filter-dropdown">
                            <label><input type="checkbox" class="prz-check" value="NO PRAZO" checked onclick="processData()"> NO PRAZO</label><br>
                            <label><input type="checkbox" class="prz-check" value="CRÍTICO" checked onclick="processData()"> CRÍTICO</label><br>
                            <label><input type="checkbox" class="prz-check" value="CONCLUÍDO" checked onclick="processData()"> CONCLUÍDO</label>
                        </div>
                    </th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</main>

<input type="file" id="fileInput" style="display:none" accept=".xlsx">

<script>
// --- FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyAaWmy-IVB8MX9hBH3wuw8zo83dHUzeqbM",
  authDomain: "relatorio-ouvidoria.firebaseapp.com",
  projectId: "relatorio-ouvidoria",
  storageBucket: "relatorio-ouvidoria.firebasestorage.app",
  messagingSenderId: "919992393287",
  appId: "1:919992393287:web:46e9d60ab2e07acfca1b62"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
let currentUnidade = 'sesc';
let allData = [];
let chartSt = null;
let chartPrz = null;

Chart.register(ChartDataLabels);

// --- LOGIN ---
function handleLogin() {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPass').value;
    const errorMsg = document.getElementById('loginError');

    if(!email || !pass) return;

    auth.signInWithEmailAndPassword(email, pass)
        .catch(err => {
            errorMsg.style.display = 'block';
            console.error(err);
        });
}

function handleLogout() { auth.signOut(); }

auth.onAuthStateChanged(user => {
    const loginScreen = document.getElementById('loginScreen');
    if (user) {
        loginScreen.style.display = 'none';
        switchUnidade('sesc');
    } else {
        loginScreen.style.display = 'flex';
    }
});

// --- LOGICA GERAL ---
function switchUnidade(u) {
    currentUnidade = u;
    const isSesc = u === 'sesc';
    document.documentElement.style.setProperty('--current-brand', isSesc ? '#003F7F' : '#F47920');
    document.getElementById('brandTitle').innerText = isSesc ? 'Sesc' : 'Senac';
    document.getElementById('mainTitle').innerText = 'Gestão de Protocolos ' + (isSesc ? 'Sesc' : 'Senac');
    document.getElementById('btnSesc').classList.toggle('active', isSesc);
    document.getElementById('btnSenac').classList.toggle('active', !isSesc);
    loadData();
}

function toggleView(view, btn) {
    const isDash = view === 'dashboard';
    document.getElementById('dashboardView').style.display = isDash ? 'grid' : 'none';
    document.getElementById('tableView').style.display = isDash ? 'none' : 'block';
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    btn.classList.add('active');
    if(isDash) processData();
}

function loadData() {
    const col = currentUnidade === 'sesc' ? 'protocolos_sesc' : 'protocolos_senac';
    db.collection(col).onSnapshot(snap => {
        allData = [];
        let stSet = new Set();
        snap.forEach(doc => {
            const d = doc.data();
            allData.push({id: doc.id, ...d});
            if(d.Status) stSet.add(d.Status);
        });
        allData.sort((a, b) => (parseInt(a['Número Sequencial']) || 0) - (parseInt(b['Número Sequencial']) || 0));
        renderStatusFilter(Array.from(stSet));
        processData();
    });
}

function renderStatusFilter(list) {
    document.getElementById('listSt').innerHTML = list.map(s => `
        <label style="display:flex;gap:10px;padding:5px 0;"><input type="checkbox" class="st-check" value="${s}" checked onclick="processData()"> ${s}</label>
    `).join('');
}

function parseDate(v) {
    if (!v) return null;
    let d;
    if (typeof v === 'number') d = new Date((v - 25569) * 86400 * 1000);
    else {
        const s = String(v).trim();
        if (s.includes('/')) {
            const p = s.split(' ')[0].split('/');
            d = new Date(p[2], p[1] - 1, p[0]);
        } else d = new Date(s);
    }
    if (d && !isNaN(d.getTime())) { d.setHours(d.getHours() + 12); return d; }
    return null;
}

function processData() {
    const search = document.getElementById('fSearch').value.toLowerCase();
    const startF = document.getElementById('dateStart').value ? new Date(document.getElementById('dateStart').value + "T00:00:00") : null;
    const endF = document.getElementById('dateEnd').value ? new Date(document.getElementById('dateEnd').value + "T23:59:59") : null;
    const selSt = Array.from(document.querySelectorAll('.st-check:checked')).map(c => c.value);
    const selPrz = Array.from(document.querySelectorAll('.prz-check:checked')).map(c => c.value);

    let m = { total: 0, open: 0, late: 0, statusMap: {}, prazoMap: {'NO PRAZO':0, 'CRÍTICO':0, 'CONCLUÍDO':0} };

    const filtered = allData.filter(item => {
        const d = parseDate(item['Data de Realização']);
        const status = item.Status || "Sem Status";
        const isAtivo = status.toLowerCase().match(/andamento|aberto|entregue/);
        const diff = d ? Math.floor((new Date() - d) / 86400000) : 0;
        const situacao = isAtivo ? (diff > 30 ? 'CRÍTICO' : 'NO PRAZO') : 'CONCLUÍDO';

        if ((!startF || (d && d >= startF)) && (!endF || (d && d <= endF)) && (selSt.length === 0 || selSt.includes(status)) && selPrz.includes(situacao) && JSON.stringify(item).toLowerCase().includes(search)) {
            m.total++;
            if (isAtivo) { m.open++; if(diff > 30) m.late++; }
            m.statusMap[status] = (m.statusMap[status] || 0) + 1;
            m.prazoMap[situacao]++;
            item._sit = situacao; item._diff = diff; item._dataStr = d ? d.toLocaleDateString('pt-BR') : '-';
            return true;
        }
        return false;
    });

    document.getElementById('totalCount').innerText = m.total;
    document.getElementById('openCount').innerText = m.open;
    document.getElementById('lateCount').innerText = m.late;
    document.getElementById('globalEff').innerText = m.total > 0 ? ((m.total - m.late) / m.total * 100).toFixed(1) + "%" : "100%";

    document.getElementById('tableBody').innerHTML = filtered.map(item => `
        <tr>
            <td style="font-weight:800">${item['Número Sequencial'] || '-'}</td>
            <td>${item._dataStr}</td>
            <td><span class="badge ${item._sit !== 'CONCLUÍDO' ? 'badge-open' : 'badge-done'}">${item.Status}</span></td>
            <td>
                <button onclick="updateStatus('${item.id}', 'Encaminhado')" class="badge" style="cursor:pointer; background:#E0E7FF; color:#4338CA; border:none; margin-right:5px;"><i class="fas fa-paper-plane"></i></button>
                <button onclick="updateStatus('${item.id}', 'Finalizado')" class="badge" style="cursor:pointer; background:#DCFCE7; color:#166534; border:none;"><i class="fas fa-check"></i></button>
            </td>
            <td>${item.Tipo || '-'}</td>
            <td>${item.Localidade || '-'}</td>
            <td><span class="badge" style="${item._sit === 'CRÍTICO' ? 'background:#FEE2E2;color:#B91C1C' : ''}">${item._sit} (${item._diff}d)</span></td>
        </tr>
    `).join('');

    updateCharts(m);
}

function updateCharts(m) {
    const total = m.total || 1;
    if (chartSt) chartSt.destroy();
    const ctxSt = document.getElementById('chartStatus');
    if(ctxSt) {
        chartSt = new Chart(ctxSt, {
            type: 'pie',
            data: { labels: Object.keys(m.statusMap), datasets: [{ data: Object.values(m.statusMap), backgroundColor: ['#003F7F', '#F47920', '#10B981', '#F59E0B', '#EF4444'] }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { color: '#fff', font: {weight:'bold'}, formatter: (v) => ((v/total)*100).toFixed(1)+'%' }, title: { display: true, text: 'Status das Demandas (%)' }, legend: { position: 'bottom', labels: { boxWidth: 12 } } } }
        });
    }

    if (chartPrz) chartPrz.destroy();
    const ctxPrz = document.getElementById('chartPrazo');
    if(ctxPrz) {
        chartPrz = new Chart(ctxPrz, {
            type: 'bar',
            data: { labels: Object.keys(m.prazoMap), datasets: [{ label: 'Qtd', data: Object.values(m.prazoMap), backgroundColor: ['#10B981', '#EF4444', '#003F7F'] }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { datalabels: { anchor: 'end', align: 'top', font: {weight:'bold'}, formatter: (v) => ((v/total)*100).toFixed(1)+'%' }, title: { display: true, text: 'Situação de SLA (%)' }, legend: { display: false } }, scales: { y: { beginAtZero: true, grace: '10%' } } }
        });
    }
}

function toggleDrop(e, id) { e.stopPropagation(); document.getElementById(id).classList.toggle('active'); }
window.onclick = () => document.querySelectorAll('.filter-dropdown').forEach(d => d.classList.remove('active'));

document.getElementById('fileInput').addEventListener('change', e => {
    const reader = new FileReader();
    reader.onload = evt => {
        const wb = XLSX.read(new Uint8Array(evt.target.result), {type: 'array'});
        const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval: ""});
        const col = currentUnidade === 'sesc' ? 'protocolos_sesc' : 'protocolos_senac';
        const batch = db.batch();
        raw.forEach(item => batch.set(db.collection(col).doc(), item));
        batch.commit().then(() => { alert("Importado com sucesso!"); e.target.value = ""; });
    };
    reader.readAsArrayBuffer(e.target.files[0]);
});

async function updateStatus(id, s) {
    const col = currentUnidade === 'sesc' ? 'protocolos_sesc' : 'protocolos_senac';
    await db.collection(col).doc(id).update({ "Status": s });
}

async function clearDatabase() {
    if (!confirm(`Limpar banco do ${currentUnidade.toUpperCase()}?`)) return;
    const col = currentUnidade === 'sesc' ? 'protocolos_sesc' : 'protocolos_senac';
    const snap = await db.collection(col).get();
    const batch = db.batch();
    snap.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
}

function exportExcel() {
    const ws = XLSX.utils.json_to_sheet(allData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Dados");
    XLSX.writeFile(wb, `Ouvidoria_${currentUnidade}.xlsx`);
}
</script>
</body>
</html>
