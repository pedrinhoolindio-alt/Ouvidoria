<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouvidoria Sesc - Gestão de SLA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#003F7F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --senac-blue: #003F7F; --senac-orange: #F47920;
            --bg: #F0F2F5; --white: #FFFFFF; --text: #1E293B;
            --muted: #64748B; --border: #E2E8F0; --danger: #EF4444;
            --success: #10B981; --warning: #F59E0B;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--senac-blue); color: #fff; height: 100vh; position: fixed; padding: 25px; display: flex; flex-direction: column; z-index: 100; }
        .sidebar h2 { font-size: 1.4rem; margin-bottom: 30px; color: var(--senac-orange); text-align: center; font-weight: 800; border-bottom: 2px solid rgba(244,121,32,0.3); padding-bottom: 15px; }
        .nav-item { padding: 14px; cursor: pointer; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .nav-item.active { background: var(--senac-orange); color: #fff; }
        .main { margin-left: 260px; flex: 1; padding: 30px; width: calc(100% - 260px); }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .filter-section { background: #fff; padding: 20px; border-radius: 16px; margin-bottom: 25px; display: flex; gap: 15px; align-items: flex-end; border: 1px solid var(--border); }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        .filter-group label { font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; }
        .filter-group input, .filter-group select { padding: 10px; border: 1px solid var(--border); border-radius: 8px; outline: none; }
        .cards-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #fff; padding: 20px; border-radius: 15px; border-top: 5px solid var(--senac-blue); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-val { font-size: 1.8rem; font-weight: 900; color: var(--senac-blue); }
        .reports-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        .report-card { background: #fff; padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
        .table-container { background: #fff; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 15px; background: #F8FAFC; color: var(--senac-blue); font-size: 0.7rem; text-transform: uppercase; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #F1F5F9; font-size: 0.8rem; }
        .badge { padding: 5px 10px; border-radius: 20px; font-weight: 800; font-size: 0.6rem; text-transform: uppercase; }
        .badge-open { background: #FEF3C7; color: #92400E; }
        .badge-done { background: #DCFCE7; color: #166534; }
        .btn-main { padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; width: 100%; }
        .btn-import { background: var(--senac-orange); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; margin-bottom: 10px; }
        .btn-export { background: var(--success); color: #fff; width: auto; padding: 10px 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2>Sesc/Senac</h2>
    <div class="nav-item active"><i class="fas fa-th-large"></i> <span>Dashboard</span></div>
    <div style="margin-top: auto;">
        <button class="btn-main btn-danger" onclick="clearDatabase()">
            <i class="fas fa-trash-alt"></i> <span>LIMPAR BANCO</span>
        </button>
        <button class="btn-main btn-import" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-cloud-upload-alt"></i> <span>IMPORTAR BASE</span>
        </button>
    </div>
</aside>

<main class="main">
    <div class="topbar">
        <h1 style="color: var(--senac-blue)">Gestão de Protocolos</h1>
        <button class="btn-main btn-export" onclick="exportExcel()">
            <i class="fas fa-file-excel"></i> EXCEL
        </button>
    </div>

    <div class="filter-section">
        <div class="filter-group">
            <label>Início</label>
            <input type="date" id="dateStart" onchange="processData()">
        </div>
        <div class="filter-group">
            <label>Fim</label>
            <input type="date" id="dateEnd" onchange="processData()">
        </div>
        <div class="filter-group">
            <label>Status</label>
            <select id="fStatus" onchange="processData()">
                <option value="Todos">Todos</option>
                <option value="Em andamento">Em andamento</option>
                <option value="Finalizado">Finalizado</option>
            </select>
        </div>
        <div class="filter-group" style="flex-grow: 1;">
            <label>Busca</label>
            <input type="text" id="fSearch" placeholder="Pesquisar..." onkeyup="processData()">
        </div>
    </div>

    <div class="cards-container">
        <div class="stat-card"><h4>Total</h4><div class="stat-val" id="totalCount">0</div></div>
        <div class="stat-card" style="border-top-color: var(--warning)"><h4>Abertos</h4><div class="stat-val" id="openCount">0</div></div>
        <div class="stat-card" style="border-top-color: var(--danger)"><h4>Críticos</h4><div class="stat-val" id="lateCount">0</div></div>
        <div class="stat-card" style="border-top-color: var(--success)"><h4>Eficiência</h4><div class="stat-val" id="globalEff">100%</div></div>
    </div>

    <div class="reports-grid">
        <div class="report-card">
            <h3>Performance SLA</h3>
            <div id="perfReport" style="margin-top:15px"></div>
        </div>
        <div class="report-card">
            <h3>Unidades</h3>
            <div id="locReport" style="margin-top:15px; max-height:150px; overflow-y:auto"></div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Protocolo</th>
                    <th>Data</th>
                    <th>Status</th>
                    <th>Ações</th>
                    <th>Localidade</th>
                    <th>Prazo</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</main>

<input type="file" id="fileInput" class="hidden" accept=".xlsx">

<script>
// CONFIGURAÇÃO FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAaWmy-IVB8MX9hBH3wuw8zo83dHUzeqbM",
  authDomain: "relatorio-ouvidoria.firebaseapp.com",
  projectId: "relatorio-ouvidoria",
  storageBucket: "relatorio-ouvidoria.appspot.com",
  messagingSenderId: "919992393287",
  appId: "1:919992393287:web:46e9d60ab2e07acfca1b62"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let allData = [];

// Carregar Dados
function initApp() {
    db.collection("protocolos").onSnapshot((snap) => {
        allData = [];
        snap.forEach(doc => allData.push({ id: doc.id, ...doc.data() }));
        processData();
    }, (error) => {
        console.error("Erro no Snapshot:", error);
    });
}
window.onload = initApp;

// Importar Excel com Tratamento de Erro
document.getElementById('fileInput').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = async (evt) => {
        try {
            const data = new Uint8Array(evt.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval: ""});
            
            const batch = db.batch();
            raw.forEach(item => {
                const ref = db.collection("protocolos").doc();
                batch.set(ref, item);
            });
            
            await batch.commit();
            alert("✓ DADOS ENVIADOS AO FIREBASE!");
        } catch (err) {
            alert("ERRO AO SALVAR: " + err.message);
            console.error(err);
        }
    };
    reader.readAsArrayBuffer(e.target.files[0]);
});

async function updateStatus(id, status) {
    await db.collection("protocolos").doc(id).update({ "Status": status });
}

async function clearDatabase() {
    if(!confirm("Apagar tudo?")) return;
    const snap = await db.collection("protocolos").get();
    const batch = db.batch();
    snap.docs.forEach(doc => batch.delete(doc.ref));
    await batch.commit();
    alert("Banco limpo.");
}

function formatDate(val) {
    if(!val) return null;
    let d = new Date(val);
    if(isNaN(d.getTime())) {
        const p = val.split('/');
        d = new Date(p[2], p[1]-1, p[0]);
    }
    d.setHours(0,0,0,0);
    return d;
}

function processData() {
    const search = document.getElementById('fSearch').value.toLowerCase();
    const start = document.getElementById('dateStart').value ? new Date(document.getElementById('dateStart').value + "T00:00:00") : null;
    const end = document.getElementById('dateEnd').value ? new Date(document.getElementById('dateEnd').value + "T00:00:00") : null;
    const statusF = document.getElementById('fStatus').value;

    let m = { total: 0, open: 0, late: 0, done: 0, locs: {} };

    const filtered = allData.filter(item => {
        const d = formatDate(item['Data de Realização']);
        const sRaw = String(item['Status'] || "").toLowerCase();
        const sGroup = sRaw.includes("andamento") ? "Em andamento" : "Finalizado";
        
        const matchD = (!start || d >= start) && (!end || d <= end);
        const matchS = statusF === "Todos" || sGroup === statusF;
        const matchSearch = JSON.stringify(item).toLowerCase().includes(search);

        if(matchD && matchS && matchSearch) {
            m.total++;
            if(sGroup === "Em andamento") {
                m.open++;
                const diff = Math.floor((new Date() - d) / 86400000);
                if(diff > 30) m.late++;
            } else { m.done++; }
            const loc = item['Localidade'] || 'Outros';
            m.locs[loc] = (m.locs[loc] || 0) + 1;
            return true;
        }
        return false;
    });

    document.getElementById('tableBody').innerHTML = filtered.map(item => {
        const d = formatDate(item['Data de Realização']);
        const diff = d ? Math.floor((new Date() - d) / 86400000) : 0;
        const isOpen = String(item['Status']).toLowerCase().includes("andamento");
        
        return `<tr>
            <td><b>${item['Número Sequencial']}</b></td>
            <td>${d ? d.toLocaleDateString('pt-BR') : '-'}</td>
            <td><span class="badge ${isOpen ? 'badge-open' : 'badge-done'}">${item['Status']}</span></td>
            <td>
                <button onclick="updateStatus('${item.id}', 'Finalizado')">✅</button>
            </td>
            <td>${item['Localidade']}</td>
            <td>${isOpen && diff > 30 ? '🚨 Crítico' : 'No prazo'}</td>
        </tr>`;
    }).join('');

    const eff = m.total > 0 ? ((m.total - m.late) / m.total * 100).toFixed(1) : 100;
    document.getElementById('totalCount').innerText = m.total;
    document.getElementById('openCount').innerText = m.open;
    document.getElementById('lateCount').innerText = m.late;
    document.getElementById('globalEff').innerText = eff + '%';
    
    let locH = '';
    Object.entries(m.locs).sort((a,b)=>b[1]-a[1]).forEach(([n, c]) => {
        locH += `<div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:5px"><span>${n}</span><b>${c}</b></div>`;
    });
    document.getElementById('locReport').innerHTML = locH;

    document.getElementById('perfReport').innerHTML = `
        <div style="display:flex; justify-content:space-between; margin-bottom:10px"><span>Concluídos:</span><b>${m.done}</b></div>
        <div style="display:flex; justify-content:space-between"><span>Abertos:</span><b>${m.open}</b></div>
    `;
}

function exportExcel() {
    const ws = XLSX.utils.json_to_sheet(allData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Dados");
    XLSX.writeFile(wb, "Ouvidoria_Sesc.xlsx");
}
</script>
</body>
</html>
