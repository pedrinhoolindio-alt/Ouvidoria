<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouvidoria Sesc - Gestão de SLA</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --senac-blue: #003F7F; --senac-orange: #F47920;
            --bg: #F0F2F5; --white: #FFFFFF; --text: #1E293B;
            --muted: #64748B; --border: #E2E8F0; --danger: #EF4444;
            --success: #10B981; --warning: #F59E0B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--senac-blue); color: #fff; height: 100vh; position: fixed; padding: 25px; display: flex; flex-direction: column; z-index: 100; }
        .sidebar h2 { font-size: 1.4rem; margin-bottom: 30px; color: var(--senac-orange); border-bottom: 2px solid rgba(244,121,32,0.3); padding-bottom: 15px; text-align: center; font-weight: 800; }
        .nav-item { padding: 14px; cursor: pointer; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .nav-item.active { background: var(--senac-orange); color: #fff; box-shadow: 0 4px 12px rgba(244,121,32,0.3); }

        .main { margin-left: 260px; flex: 1; padding: 30px; width: calc(100% - 260px); }
        
        /* Topbar */
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .topbar h1 { font-size: 1.5rem; font-weight: 800; color: var(--senac-blue); }
        .status-badge { font-size: 0.7rem; padding: 5px 10px; border-radius: 20px; font-weight: bold; }

        /* Cards */
        .cards-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #fff; padding: 25px; border-radius: 20px; border-top: 6px solid var(--senac-blue); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .stat-card h4 { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
        .stat-val { font-size: 2rem; font-weight: 900; color: var(--senac-blue); }

        /* Tabela */
        .table-container { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 18px; text-align: left; background: #F8FAFC; color: var(--senac-blue); font-weight: 700; font-size: 0.75rem; text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 16px; border-bottom: 1px solid #F1F5F9; font-size: 0.85rem; }

        .badge { padding: 6px 12px; border-radius: 30px; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; }
        .badge-open { background: #FEF3C7; color: #92400E; }
        .badge-done { background: #DCFCE7; color: #166534; }
        .badge-late { background: #FEE2E2; color: #B91C1C; }

        /* Botões */
        .btn-main { padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; display: flex; align-items: center; gap: 8px; transition: 0.3s; width: 100%; justify-content: center; }
        .btn-import { background: var(--senac-orange); color: #fff; margin-bottom: 10px; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-action { padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: white; cursor: pointer; transition: 0.2s; }
        .btn-action:hover { background: var(--senac-blue); color: white; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2>Sesc/Senac</h2>
    <div class="nav-item active"><i class="fas fa-th-large"></i> <span>Dashboard</span></div>
    
    <div style="margin-top: auto;">
        <button class="btn-main btn-import" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-cloud-upload-alt"></i> <span>IMPORTAR BASE</span>
        </button>
        <button class="btn-main btn-danger" onclick="limparBanco()">
            <i class="fas fa-trash-alt"></i> <span>LIMPAR BANCO</span>
        </button>
    </div>
</aside>

<main class="main">
    <div class="topbar">
        <h1>Gestão de Protocolos e SLA</h1>
        <div id="statusConexao" class="status-badge" style="background: #eee; color: #666;">● Tentando conexão...</div>
    </div>

    <div class="cards-container">
        <div class="stat-card"><h4>Total Analisado</h4><div class="stat-val" id="totalCount">0</div></div>
        <div class="stat-card" style="border-top-color: var(--warning);"><h4>Em Aberto</h4><div class="stat-val" id="openCount">0</div></div>
        <div class="stat-card" style="border-top-color: var(--danger);"><h4>Atrasos (>30d)</h4><div class="stat-val" id="lateCount">0</div></div>
        <div class="stat-card" style="border-top-color: var(--success);"><h4>Eficiência</h4><div class="stat-val" id="globalEff">100%</div></div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Protocolo</th>
                    <th>Data</th>
                    <th>Status</th>
                    <th>Localidade</th>
                    <th>Prazo</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</main>

<input type="file" id="fileInput" class="hidden" accept=".xlsx">

<script>
// CONFIGURAÇÃO FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAaWmy-IVB8MX9hBH3wuw8zo83dHUzeqbM",
  authDomain: "relatorio-ouvidoria.firebaseapp.com",
  projectId: "relatorio-ouvidoria",
  storageBucket: "relatorio-ouvidoria.appspot.com",
  messagingSenderId: "919992393287",
  appId: "1:919992393287:web:46e9d60ab2e07acfca1b62"
};

// Inicialização
try {
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    document.getElementById('statusConexao').innerHTML = "● Banco Conectado";
    document.getElementById('statusConexao').style.background = "#DCFCE7";
    document.getElementById('statusConexao').style.color = "#166534";

    // Carregar Dados em Tempo Real
    db.collection("protocolos").onSnapshot(snap => {
        let allData = [];
        let abertos = 0;
        let criticos = 0;
        const hoje = new Date();
        hoje.setHours(0,0,0,0);

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        snap.forEach(doc => {
            const item = doc.data();
            allData.push(item);
            
            const statusRaw = String(item['Status'] || "Em andamento");
            const isOpen = statusRaw.toLowerCase().includes("andamento");
            
            // Lógica de Data e SLA
            let dataFormatada = "---";
            let prazoHtml = '<span class="badge badge-done">No Prazo</span>';
            
            if (item['Data de Realização']) {
                let d = new Date(item['Data de Realização']);
                if(isNaN(d.getTime())) {
                    const p = String(item['Data de Realização']).split('/');
                    d = new Date(p[2], p[1]-1, p[0]);
                }
                dataFormatada = d.toLocaleDateString('pt-BR');
                
                if (isOpen) {
                    abertos++;
                    const diffDays = Math.floor((hoje - d) / 86400000);
                    if (diffDays > 30) {
                        criticos++;
                        prazoHtml = '<span class="badge badge-late">🚨 Crítico</span>';
                    }
                } else {
                    prazoHtml = '<span class="badge badge-done">✓ Concluído</span>';
                }
            }

            tbody.innerHTML += `
                <tr>
                    <td><b>${item['Número Sequencial'] || '---'}</b></td>
                    <td>${dataFormatada}</td>
                    <td><span class="badge ${isOpen ? 'badge-open' : 'badge-done'}">${statusRaw}</span></td>
                    <td>${item['Localidade'] || '---'}</td>
                    <td>${prazoHtml}</td>
                    <td>
                        <button class="btn-action" onclick="finalizar('${doc.id}')" title="Finalizar"><i class="fas fa-check"></i></button>
                    </td>
                </tr>
            `;
        });

        // Métricas
        const total = allData.length;
        document.getElementById('totalCount').innerText = total;
        document.getElementById('openCount').innerText = abertos;
        document.getElementById('lateCount').innerText = criticos;
        const eff = total > 0 ? ((total - criticos) / total * 100).toFixed(1) : 100;
        document.getElementById('globalEff').innerText = eff + "%";

    }, err => {
        alert("Erro de Permissão: Acesse o Firebase > Firestore > Rules e clique em Publicar.");
    });

    // Importar Excel
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = async (evt) => {
            const data = new Uint8Array(evt.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            
            const batch = db.batch();
            json.forEach(item => {
                const ref = db.collection("protocolos").doc();
                batch.set(ref, item);
            });
            await batch.commit();
            alert("✓ " + json.length + " registros sincronizados!");
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    // Ações
    window.finalizar = async (id) => {
        await db.collection("protocolos").doc(id).update({ "Status": "Finalizado" });
    };

    window.limparBanco = async () => {
        if(!confirm("⚠️ Apagar TODOS os dados permanentemente?")) return;
        const snap = await db.collection("protocolos").get();
        const batch = db.batch();
        snap.docs.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        alert("Banco limpo!");
    };

} catch (e) {
    alert("Erro Crítico: " + e.message);
}
</script>
</body>
</html>
